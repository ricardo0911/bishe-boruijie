<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图3-3 商家端功能模块图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "SimSun", "宋体", serif;
      background: #fff;
      color: #222;
      padding: 24px 8px 30px;
      display: flex;
      justify-content: center;
    }
    .page { width: min(940px, 100%); }
    .diagram {
      width: 900px;
      height: 620px;
      position: relative;
      margin: 0 auto;
      background: #fff;
      overflow: hidden;
    }
    .node {
      position: absolute;
      border: 1.5px solid #666;
      background: #fff;
      color: #222;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: nowrap;
    }
    .root {
      left: 300px;
      top: 28px;
      width: 300px;
      height: 72px;
      font-size: 38px;
      line-height: 1;
    }
    .child {
      top: 190px;
      width: 108px;
      height: 300px;
      padding: 16px 0;
      font-size: 26px;
      line-height: 1.05;
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 2px;
      overflow: hidden;
    }
    .svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .caption {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="diagram">
      <svg class="svg" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
        <line x1="450" y1="100" x2="450" y2="150" stroke="#666" stroke-width="2" />
        <line x1="116" y1="150" x2="776" y2="150" stroke="#666" stroke-width="2" />
        <line x1="116" y1="150" x2="116" y2="190" stroke="#666" stroke-width="2" />
        <line x1="248" y1="150" x2="248" y2="190" stroke="#666" stroke-width="2" />
        <line x1="380" y1="150" x2="380" y2="190" stroke="#666" stroke-width="2" />
        <line x1="512" y1="150" x2="512" y2="190" stroke="#666" stroke-width="2" />
        <line x1="644" y1="150" x2="644" y2="190" stroke="#666" stroke-width="2" />
        <line x1="776" y1="150" x2="776" y2="190" stroke="#666" stroke-width="2" />
      </svg>

      <div class="node root">商家端功能模块</div>

      <div class="node child" style="left:62px;">商品维护</div>
      <div class="node child" style="left:194px;">订单处理</div>
      <div class="node child" style="left:326px;">库存管理</div>
      <div class="node child" style="left:458px;">预警查看</div>
      <div class="node child" style="left:590px;">销售报表</div>
      <div class="node child" style="left:722px;">经营分析</div>
    </div>
    <div class="caption">图3-3 商家端功能模块图</div>
  </main>
</body>
</html>
