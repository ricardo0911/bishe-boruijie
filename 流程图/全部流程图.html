    function addText(svg, x, y, text, size = TEXT_SIZE) {
      const lines = String(text).split("\n");
      const g = document.createElementNS(NS, "g");
      lines.forEach((line, idx) => {
        const t = document.createElementNS(NS, "text");
        t.setAttribute("x", x);
        t.setAttribute("y", y + (idx - (lines.length - 1) / 2) * (size * 1.1));
        t.setAttribute("text-anchor", "middle");
        t.setAttribute("dominant-baseline", "middle");
        t.setAttribute("font-size", String(size));
        t.setAttribute("font-family", "宋体, SimSun, serif");
        t.textContent = line;
        g.appendChild(t);
      });
      svg.appendChild(g);
    }

    function drawNode(svg, node) {
      const fontSize = TEXT_SIZE;
      if (node.type === "decision") {
        const p = document.createElementNS(NS, "polygon");
        const left = node.x - DIA_W / 2;
        const right = node.x + DIA_W / 2;
        const top = node.y - DIA_H / 2;
        const bottom = node.y + DIA_H / 2;
        p.setAttribute("points", `${node.x},${top} ${right},${node.y} ${node.x},${bottom} ${left},${node.y}`);
        p.setAttribute("fill", "#fff");
        p.setAttribute("stroke", "#4e5560");
        p.setAttribute("stroke-width", "3");
        svg.appendChild(p);
        addText(svg, node.x, node.y, node.text, fontSize);
        return;
      }

      const r = document.createElementNS(NS, "rect");
      r.setAttribute("x", String(node.x - RECT_W / 2));
      r.setAttribute("y", String(node.y - RECT_H / 2));
      r.setAttribute("width", String(RECT_W));
      r.setAttribute("height", String(RECT_H));
      r.setAttribute("fill", "#fff");
      r.setAttribute("stroke", "#4e5560");
      r.setAttribute("stroke-width", "3");
      if (node.type === "term") {
        r.setAttribute("rx", "35");
        r.setAttribute("ry", "35");
      }
      svg.appendChild(r);
      addText(svg, node.x, node.y, node.text, fontSize);
    }

    function drawEdge(svg, edge) {
      const pl = document.createElementNS(NS, "polyline");
      pl.setAttribute("points", edge.points.map(p => `${p[0]},${p[1]}`).join(" "));
      pl.setAttribute("fill", "none");
      pl.setAttribute("stroke", "#4e5560");
      pl.setAttribute("stroke-width", "3");
      pl.setAttribute("marker-end", "url(#arrow)");
      svg.appendChild(pl);

      if (edge.label) {
        addText(svg, edge.lx, edge.ly, edge.label, TEXT_SIZE);
      }
    }

    function createFlowCard(flow) {
      const card = document.createElement("section");
      card.className = "card";

      const svg = document.createElementNS(NS, "svg");
      svg.classList.add("flow-svg");
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

      const defs = document.createElementNS(NS, "defs");
      const marker = document.createElementNS(NS, "marker");
      marker.setAttribute("id", "arrow");
      marker.setAttribute("markerWidth", "6");
      marker.setAttribute("markerHeight", "6");
      marker.setAttribute("refX", "5");
      marker.setAttribute("refY", "3");
      marker.setAttribute("orient", "auto");
      marker.setAttribute("markerUnits", "strokeWidth");
      const path = document.createElementNS(NS, "path");
      path.setAttribute("d", "M0,0 L6,3 L0,6 z");
      path.setAttribute("fill", "#3f4650");
      marker.appendChild(path);
      defs.appendChild(marker);
      svg.appendChild(defs);

      flow.edges.forEach(e => drawEdge(svg, e));
      flow.nodes.forEach(n => drawNode(svg, n));

      const caption = document.createElement("div");
      caption.className = "caption";
      caption.textContent = flow.caption;

      card.appendChild(svg);
      card.appendChild(caption);
      return card;
    }

    const app = document.getElementById("app");
    flows.forEach(flow => app.appendChild(createFlowCard(flow)));
