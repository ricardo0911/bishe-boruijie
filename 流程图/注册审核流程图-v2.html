<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册审核流程图</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "宋体", "SimSun", serif;
      background: #ffffff;
      color: #222;
      display: flex;
      justify-content: center;
      padding: 4px;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    .page {
      width: min(780px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .diagram {
      width: 760px;
      height: 720px;
      position: relative;
      background: #fff;
    }
    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      shape-rendering: geometricPrecision;
    }
    .node {
      position: absolute;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 3px solid #4e5560;
      background: #fff;
      color: #222;
      font-size: 24px;
      line-height: 1;
      width: 176px;
      height: 70px;
      left: 292px;
    }
    .terminator {
      border-radius: 35px;
    }
    .rect {
      border-radius: 2px;
    }
    .diamond {
      border: none;
      width: 176px;
      height: 94px;
      left: 292px;
      font-size: 24px;
    }
    .diamond svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .diamond span {
      position: relative;
      z-index: 2;
    }
    .tag {
      position: absolute;
      z-index: 2;
      font-size: 24px;
      color: #333;
      background: #fff;
      padding: 2px 4px;
      line-height: 1;
    }
    .tag-yes {
      left: 366px;
      top: 452px;
    }
    .tag-no {
      left: 110px;
      top: 292px;
    }
    .caption {
      font-size: 16px;
      letter-spacing: 1px;
      text-align: center;
      margin-top: 2px;
    }
    .node, .tag, .caption, svg text {
      font-family: "宋体", "SimSun", serif;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="diagram">
      <svg viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg" aria-label="注册审核流程图连线">
        <defs>
          <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L6,3 L0,6 z" fill="#3f4650" />
          </marker>
        </defs>

        <!-- 主链路 -->
        <line x1="380" y1="90" x2="380" y2="150" stroke="#4e5560" stroke-width="3" marker-end="url(#arrow)" />
        <line x1="380" y1="220" x2="380" y2="330" stroke="#4e5560" stroke-width="3" marker-end="url(#arrow)" />
        <line x1="380" y1="424" x2="380" y2="500" stroke="#4e5560" stroke-width="3" marker-end="url(#arrow)" />
        <line x1="380" y1="570" x2="380" y2="640" stroke="#4e5560" stroke-width="3" marker-end="url(#arrow)" />

        <!-- 否回路 -->
        <line x1="292" y1="377" x2="130" y2="377" stroke="#4e5560" stroke-width="3" />
        <line x1="130" y1="377" x2="130" y2="185" stroke="#4e5560" stroke-width="3" />
        <line x1="130" y1="185" x2="290" y2="185" stroke="#4e5560" stroke-width="3" marker-end="url(#arrow)" />
      </svg>

      <div class="node terminator" style="top: 20px;">开始</div>
      <div class="node rect" style="top: 150px;">注册账号</div>

      <div class="node diamond" style="top: 330px;">
        <svg viewBox="0 0 176 94" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="88,0 176,47 88,94 0,47" fill="#fff" stroke="#4e5560" stroke-width="3" />
        </svg>
        <span>系统审核</span>
      </div>

      <div class="node rect" style="top: 500px;">创建档案</div>
      <div class="node terminator" style="top: 640px;">完成</div>

      <div class="tag tag-yes">是</div>
      <div class="tag tag-no">否</div>
    </div>
    <div class="caption">图4-x 用户注册审核流程图</div>
  </main>
</body>
</html>
