<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图2-1 系统总用例图（项目版）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "SimSun", "宋体", serif;
      background: #fff;
      color: #222;
      padding: 16px 8px 24px;
    }
    .page { width: 1800px; margin: 0 auto; }
    .diagram {
      position: relative;
      width: 1800px;
      height: 1100px;
      background: #fff;
      overflow: hidden;
    }
    .boundary {
      position: absolute;
      left: 260px;
      top: 90px;
      width: 1280px;
      height: 860px;
      border: 1.6px solid #666;
      background: #fff;
      z-index: 0;
    }
    .boundary-title {
      position: absolute;
      left: 14px;
      top: -14px;
      padding: 0 6px;
      background: #fff;
      font-size: 22px;
      color: #222;
    }
    .actor {
      position: absolute;
      width: 130px;
      text-align: center;
      z-index: 3;
    }
    .head {
      width: 24px;
      height: 24px;
      border: 1.6px solid #333;
      border-radius: 50%;
      margin: 0 auto;
      background: #fff;
    }
    .body {
      width: 1.6px;
      height: 28px;
      background: #333;
      margin: 0 auto;
    }
    .arms {
      width: 40px;
      height: 1.6px;
      background: #333;
      margin: -20px auto 0;
    }
    .legs {
      position: relative;
      width: 34px;
      height: 24px;
      margin: 0 auto;
    }
    .legs::before,
    .legs::after {
      content: "";
      position: absolute;
      top: 0;
      width: 1.6px;
      height: 24px;
      background: #333;
    }
    .legs::before { left: 8px; transform: rotate(18deg); }
    .legs::after { right: 8px; transform: rotate(-18deg); }
    .actor-label {
      margin-top: 4px;
      font-size: 28px;
      white-space: nowrap;
    }
    .oval {
      position: absolute;
      min-width: 220px;
      height: 60px;
      padding: 0 18px;
      border: 1.6px solid #2f5f90;
      border-radius: 999px;
      background: #b9d7f3;
      color: #111;
      text-align: center;
      font-size: 24px;
      line-height: 60px;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      z-index: 2;
    }
    .wide { min-width: 320px; }
    .twolines {
      height: 74px;
      line-height: 1.24;
      padding-top: 11px;
      white-space: normal;
      font-size: 22px;
    }
    .svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .caption {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="diagram">
      <div class="boundary">
        <div class="boundary-title">花店智能管理系统</div>
      </div>

      <svg class="svg" viewBox="0 0 1800 1100" xmlns="http://www.w3.org/2000/svg">
        <!-- 小程序用户 -->
        <line x1="190" y1="470" x2="620" y2="170" stroke="#444" stroke-width="1.6"/>
        <line x1="190" y1="470" x2="560" y2="310" stroke="#444" stroke-width="1.6"/>
        <line x1="190" y1="470" x2="560" y2="430" stroke="#444" stroke-width="1.6"/>
        <line x1="190" y1="470" x2="560" y2="550" stroke="#444" stroke-width="1.6"/>
        <line x1="190" y1="470" x2="560" y2="670" stroke="#444" stroke-width="1.6"/>
        <line x1="190" y1="470" x2="560" y2="790" stroke="#444" stroke-width="1.6"/>

        <!-- 商家 -->
        <line x1="910" y1="960" x2="900" y2="170" stroke="#444" stroke-width="1.6"/>
        <line x1="910" y1="960" x2="900" y2="320" stroke="#444" stroke-width="1.6"/>
        <line x1="910" y1="960" x2="900" y2="460" stroke="#444" stroke-width="1.6"/>
        <line x1="910" y1="960" x2="900" y2="620" stroke="#444" stroke-width="1.6"/>
        <line x1="910" y1="960" x2="900" y2="780" stroke="#444" stroke-width="1.6"/>
        <line x1="910" y1="960" x2="1240" y2="660" stroke="#444" stroke-width="1.6"/>
        <line x1="910" y1="960" x2="1240" y2="780" stroke="#444" stroke-width="1.6"/>

        <!-- 管理员 -->
        <line x1="1730" y1="390" x2="1160" y2="170" stroke="#444" stroke-width="1.6"/>
        <line x1="1730" y1="390" x2="1240" y2="300" stroke="#444" stroke-width="1.6"/>
        <line x1="1730" y1="390" x2="1240" y2="420" stroke="#444" stroke-width="1.6"/>
        <line x1="1730" y1="390" x2="1240" y2="540" stroke="#444" stroke-width="1.6"/>
        <line x1="1730" y1="390" x2="900" y2="620" stroke="#444" stroke-width="1.6"/>
        <line x1="1730" y1="390" x2="900" y2="780" stroke="#444" stroke-width="1.6"/>
        <line x1="1730" y1="390" x2="1240" y2="660" stroke="#444" stroke-width="1.6"/>

        <!-- 运营人员 -->
        <line x1="1730" y1="690" x2="1220" y2="170" stroke="#444" stroke-width="1.6"/>
        <line x1="1730" y1="690" x2="1240" y2="660" stroke="#444" stroke-width="1.6"/>
        <line x1="1730" y1="690" x2="1240" y2="780" stroke="#444" stroke-width="1.6"/>
        <line x1="1730" y1="690" x2="1240" y2="300" stroke="#444" stroke-width="1.6"/>
        <line x1="1730" y1="690" x2="1240" y2="420" stroke="#444" stroke-width="1.6"/>

        <!-- 支付平台 -->
        <line x1="190" y1="820" x2="760" y2="700" stroke="#444" stroke-width="1.6"/>

        <!-- 关系 -->
        <line x1="560" y1="670" x2="760" y2="700" stroke="#666" stroke-width="1.4" stroke-dasharray="8 6"/>
      </svg>

      <div class="actor" style="left:120px; top:420px;">
        <div class="head"></div><div class="body"></div><div class="arms"></div><div class="legs"></div>
        <div class="actor-label">小程序用户</div>
      </div>

      <div class="actor" style="left:840px; top:900px;">
        <div class="head"></div><div class="body"></div><div class="arms"></div><div class="legs"></div>
        <div class="actor-label">商家</div>
      </div>

      <div class="actor" style="left:1660px; top:340px;">
        <div class="head"></div><div class="body"></div><div class="arms"></div><div class="legs"></div>
        <div class="actor-label">管理员</div>
      </div>

      <div class="actor" style="left:1660px; top:640px;">
        <div class="head"></div><div class="body"></div><div class="arms"></div><div class="legs"></div>
        <div class="actor-label">运营人员</div>
      </div>

      <div class="actor" style="left:120px; top:760px;">
        <div class="head"></div><div class="body"></div><div class="arms"></div><div class="legs"></div>
        <div class="actor-label">支付平台</div>
      </div>

      <div class="oval wide" style="left:900px; top:170px;">统一登录与身份识别</div>

      <div class="oval" style="left:560px; top:310px;">浏览/检索商品</div>
      <div class="oval" style="left:560px; top:430px;">购物车与收藏管理</div>
      <div class="oval" style="left:560px; top:550px;">地址与优惠券管理</div>
      <div class="oval" style="left:560px; top:670px;">下单与支付</div>
      <div class="oval wide" style="left:560px; top:790px;">订单查询/取消/确认收货</div>

      <div class="oval" style="left:900px; top:320px;">商品与花材维护</div>
      <div class="oval wide twolines" style="left:900px; top:460px;">库存批次(FEFO)管理<br/>与补货入库</div>
      <div class="oval" style="left:900px; top:620px;">订单履约处理</div>
      <div class="oval" style="left:900px; top:780px;">售后退款处理</div>

      <div class="oval" style="left:1240px; top:300px;">用户管理</div>
      <div class="oval" style="left:1240px; top:420px;">商家管理</div>
      <div class="oval" style="left:1240px; top:540px;">系统配置管理</div>
      <div class="oval" style="left:1240px; top:660px;">运营统计看板</div>
      <div class="oval wide twolines" style="left:1240px; top:780px;">销售报表与<br/>趋势分析</div>

      <div class="oval" style="left:760px; top:700px;">支付结果回调处理</div>
    </div>
    <div class="caption">图2-1 系统总用例图（按项目代码抽取）</div>
  </main>
</body>
</html>
