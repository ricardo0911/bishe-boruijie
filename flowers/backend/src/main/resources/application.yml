server:
  port: 18080

app:
  admin-web-root: ../flower-admin-web/
  merchant-web-root: ../flower-merchant-web/
  upload-dir: uploads/
  debug-seed:
    enabled: false
  auth:
    enabled: true
    accounts:
      admin:
        account: ${ADMIN_ACCOUNT:admin}
        password: ${ADMIN_PASSWORD:admin123456}
        display-name: ${ADMIN_DISPLAY_NAME:System Admin}
      merchant:
        account: ${MERCHANT_ACCOUNT:merchant}
        password: ${MERCHANT_PASSWORD:merchant123456}
        display-name: ${MERCHANT_DISPLAY_NAME:Merchant Operator}
  wechat:
    pay:
      api-key: ${WECHAT_PAY_API_KEY:}
      mch-id: ${WECHAT_PAY_MCH_ID:}
      app-id: ${WECHAT_PAY_APP_ID:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:18080,http://127.0.0.1:18080,http://localhost:8080,http://127.0.0.1:8080}

spring:
  application:
    name: flower-shop-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/flower_shop?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET NAMES utf8mb4
  jackson:
    time-zone: Asia/Shanghai
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    format:
      date-time: yyyy-MM-dd HH:mm:ss

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui/index.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.flowershop: INFO
